<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrewMaster Coffee Machine</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="counter">
        <header class="topbar">
          <div class="brand">
            <img src="./assets/logo.png" alt="" />
            <span>BrewMaster</span>
          </div>
          <button class="ghost-button" id="reportButton" type="button">Report</button>
        </header>

        <section class="menu-panel" aria-label="Coffee menu">
          <h1>Choose Your Coffee</h1>
          <div class="drink-grid" id="drinkGrid"></div>
        </section>

        <section class="brew-panel" aria-live="polite">
          <div class="order-copy">
            <h2 id="selectedTitle">Select a drink</h2>
            <p id="selectedDetails">Pick a coffee above to see the order details.</p>
          </div>

          <div class="brew-stage" id="brewStage">
            <div class="machine-head"></div>
            <div class="steam steam-one"></div>
            <div class="steam steam-two"></div>
            <div class="steam steam-three"></div>
            <div class="drip"></div>
            <div class="cup">
              <div class="coffee-fill" id="coffeeFill"></div>
              <div class="cup-handle"></div>
            </div>
            <div class="saucer"></div>
          </div>

          <div class="brew-actions">
            <button class="primary-button" id="buyButton" type="button" disabled>
              Buy Coffee
            </button>
            <div class="progress-track" aria-hidden="true">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <p id="brewStatus">Ready</p>
          </div>
        </section>
      </section>

      <aside class="status-panel" aria-label="Machine status">
        <h2>Machine Status</h2>
        <div class="resource-list" id="resourceList"></div>
        <div class="profit-box">
          <span>Profit</span>
          <strong id="profitValue">$0.00</strong>
        </div>
        <button class="secondary-button" id="refillButton" type="button">Refill Machine</button>
      </aside>
    </main>

    <dialog id="paymentDialog">
      <form method="dialog" class="dialog-card" id="paymentForm">
        <h2 id="paymentTitle">Payment</h2>
        <p id="paymentPrice"></p>
        <label for="amountInput">Amount paid</label>
        <input id="amountInput" type="number" step="0.01" min="0" autocomplete="off" />
        <p class="dialog-error" id="paymentError"></p>
        <div class="dialog-actions">
          <button class="ghost-button" value="cancel" type="button" id="cancelPayment">Cancel</button>
          <button class="primary-button" type="submit">Pay</button>
        </div>
      </form>
    </dialog>

    <dialog id="refillDialog">
      <form method="dialog" class="dialog-card" id="refillForm">
        <h2>Refill Machine</h2>
        <label for="waterInput">Water</label>
        <input id="waterInput" type="number" min="0" step="1" value="0" />
        <label for="milkInput">Milk</label>
        <input id="milkInput" type="number" min="0" step="1" value="0" />
        <label for="coffeeInput">Coffee</label>
        <input id="coffeeInput" type="number" min="0" step="1" value="0" />
        <p class="dialog-error" id="refillError"></p>
        <div class="dialog-actions">
          <button class="ghost-button" value="cancel" type="button" id="cancelRefill">Cancel</button>
          <button class="primary-button" type="submit">Refill</button>
        </div>
      </form>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
